services:
  db:
    image: postgres:16-alpine
    container_name: school-finance-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-school_finance}
      POSTGRES_USER: ${POSTGRES_USER:-school}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-school}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-school} -d ${POSTGRES_DB:-school_finance}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: school-finance-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-secret-key}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      DATABASE_URL: postgresql://${POSTGRES_USER:-school}:${POSTGRES_PASSWORD:-school}@db:5432/${POSTGRES_DB:-school_finance}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-1}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
      PORT: ${PORT:-5000}
    ports:
      - "5000:5000"

volumes:
  postgres_data:
